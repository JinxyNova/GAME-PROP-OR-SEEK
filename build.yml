name: build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installer le JDK 25 (requis par pom.xml : maven.compiler.release=25)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Compiler et empaqueter avec Maven
        working-directory: cachecache
        run: mvn -B -ntp clean package

      - name: Publier le jar généré
        uses: actions/upload-artifact@v4
        with:
          name: CacheCache-jar
          path: cachecache/target/CacheCache.jar
          if-no-files-found: error
