name: CacheCache
version: '1.0.0'
main: fr.merci.cachecache.CacheCachePlugin
api-version: '26.2'
author: Merci
description: Un mini-jeu de cache-cache avec un mode Prop Hunt (déguisement en bloc) et un mode classique.
commands:
  cachecache:
    aliases: [cc]
    description: Gère une partie de cache-cache
    usage: |
      /cachecache start <prophunt|hideandseek> [nbChats] [nbSouris] - lance immédiatement
      /cachecache queue <prophunt|hideandseek> [nbChats] [nbSouris] - préconfigure la file d'attente
      /cachecache join - rejoint la file d'attente
      /cachecache leave - quitte la file d'attente
      /cachecache stop - arrête la partie ou annule la file d'attente
      /cachecache reload - recharge le config.yml
